name: Build

on:
  push:
    branches:
      - 'main'
  pull_request: {}
  workflow_dispatch:

jobs:
  build:

    permissions:
      # Cf. https://github.com/marketplace/actions/publish-test-results#permissions
      checks: write
      pull-requests: write

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/gradle-build-action@ac2d340dc04d9e1113182899e983b5400c17cda1 # v3

      - name: Install Skaffold
        uses: yokawasa/action-setup-kube-tools@9d39563c24d4a419d1a8289c34d6da5a6171252c # v0.13.5
        with:
          kubectl: '1.33.2'
          helm: '3.18.3'
          skaffold: '2.16.1'

      - name: Gradle assemble
        run: ./gradlew assemble

      - name: Kubernetes KinD Cluster
        id: kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          registry: true
          registry_name: my-registry
          registry_port: 5001
          registry_enable_delete: true
          config: ci/cluster.yaml

      - name: Install ingress controller
        run: ./ci/install-ingress.sh

      - name: Build Images
        run: skaffold build --filename='skaffold-test.yaml' --default-repo ${{ steps.kind.outputs.LOCAL_REGISTRY }} --insecure-registry ${{ steps.kind.outputs.LOCAL_REGISTRY }} --push --disable-multi-platform-build=true --file-output=tags.json

      - name: Deploy Cluster
        run: ./ci/deploy.sh

      - name: Run integration tests
        run: ./gradlew build -Pmodelix.baseurl="http://localhost:20080"

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2
        # Also report in case the build failed
        if: always()
        with:
          files: |
            **/test-results/**/*.xml

      - name: Archive test report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        # Archive test reports for introspection even if the build failed. They are most useful in this situation.
        if: always()
        with:
          name: test-report
          path: |
            */build/test-results
            */build/reports
