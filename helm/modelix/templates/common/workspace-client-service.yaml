{{- if .Values.workspaces.enabled  -}}
apiVersion: v1
kind: Service
metadata:
  labels:
    component: workspace-client
    {{- include "modelix.labels" . | nindent 4 }}
  name: "{{ include "modelix.fullname" . }}-workspace-client"
spec:
  type: NodePort
  ports:
  - name: "projector"
    port: 8887
    targetPort: 8887
  - name: "diff"
    port: 33334
    targetPort: 33334
  - name: "generator"
    port: 33335
    targetPort: 33335
  {{ if .Values.workspaces.client.experimentalCustomServicePort }}
  - name: "custom-service"
    port: 33336
    targetPort: "custom-service"
  {{ end }}
  - name: "debug"
    port: 5071
    targetPort: 5071
  - name: "yourkit"
    port: 10001
    targetPort: 10001
  selector:
    component: workspace-client
    {{- include "modelix.selectorLabels" . | nindent 4 }}
{{- end -}}
